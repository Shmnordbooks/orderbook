  .login-card{
    position:relative;z-index:1;
    width:380px;max-width:92vw;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:48px 36px 40px;
    box-shadow:0 24px 80px rgba(0,0,0,0.5);
  }

  .brand{text-align:center;margin-bottom:36px}
  .brand svg{width:140px;height:auto;opacity:0.85;margin-bottom:16px}
  .brand h1{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;font-size:20px;letter-spacing:3px;
    text-transform:uppercase;color:var(--text-muted);
  }
  .brand .sub{
    font-size:12px;color:var(--text-dim);margin-top:6px;
    letter-spacing:1px;text-transform:uppercase;
  }

  .field{margin-bottom:24px}
  .field label{
    display:block;font-size:11px;font-weight:600;
    text-transform:uppercase;letter-spacing:1.5px;
    color:var(--text-muted);margin-bottom:8px;
  }
  .field input{
    width:100%;padding:14px 16px;
    background:var(--card);color:var(--text);
    border:1px solid var(--border);border-radius:10px;
    font-family:'Barlow Condensed',sans-serif;
    font-size:18px;font-weight:500;letter-spacing:2px;
    text-transform:uppercase;text-align:center;
    outline:none;transition:border-color .2s, box-shadow .2s;
  }
  .field input::placeholder{
    color:var(--text-dim);font-weight:400;letter-spacing:1px;
    text-transform:none;font-size:14px;
  }
  .field input:focus{
    border-color:var(--shimano-blue);
    box-shadow:0 0 0 3px rgba(0,130,202,0.15);
  }

  .btn-submit{
    width:100%;padding:15px;border:none;border-radius:10px;
    background:linear-gradient(135deg, var(--shimano-blue), #006aa8);
    color:#fff;font-family:'Barlow Condensed',sans-serif;
    font-size:16px;font-weight:700;letter-spacing:3px;
    text-transform:uppercase;cursor:pointer;
    transition:transform .15s, box-shadow .15s, opacity .15s;
  }
  .btn-submit:hover{
    transform:translateY(-1px);
    box-shadow:0 6px 24px rgba(0,130,202,0.3);
  }
  .btn-submit:active{transform:translateY(0);opacity:0.9}

  .error-msg{
    text-align:center;margin-top:16px;
    font-size:13px;font-weight:500;color:var(--accent);
    min-height:20px;
    transition:opacity .25s;
  }

  .footer-note{
    text-align:center;margin-top:28px;
    font-size:11px;color:var(--text-dim);letter-spacing:.5px;
  }
</style>
</head>
<body>

<div class="login-card">

  <div class="brand">
    <h1>Order Books</h1>
  </div>

  <div class="field">
    <label for="accessCode">Access Code</label>
    <input type="text" id="accessCode" placeholder="Enter your dealer code" autocomplete="off" spellcheck="false">
  </div>

  <button class="btn-submit" id="submitBtn">Enter Catalog</button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="footer-note">Contact your distributor if you don't have a code.</div>
</div>

<script>
(function(){
  'use strict';

  // ── Şifreler ve Logoların Eşleşmesi ──
  var DEALER_LOGOS = {
    'ALGHARIYA-2026': 'alghariya.png',
    'BIKEERA-2026': 'bikeera.png',
    'REVO-2026': 'revo.png',
    'WOLFIS-2026': 'wolfis.png',
    'TREK-2026': 'trek.png',
    'TCH-2026': 'tch.png',
    'EMSONS-2026': 'emsons.png',
    'ALBOOM-2026': 'alboom.png',
    'CRANK-2026': 'crank.png',
    'MUSCAT-2026': 'muscat.png',
    'SS-2026': 'ss.png',
    'BIKELANE-2026': 'bikelane.png',
    'ACTIVE-2026': 'active.png',
    'WHEELS-2026': 'wheels.png',
    'LIMPOPO-2026': 'limpopo.png',
    'DAKAMUZ-2026': 'dakamuz.jpg',
    'DAKAMKZ-2026': 'dakamkz.jpg',
    'CYCLEKOM-2026': 'cyclekom.png',
    'EXTREME-2026': 'extreme.png',
    'EXTERNAL-2026': 'external.png'  
  };

  var VALID_CODES = ['GCC-2026', 'DEALER-VIP'].concat(Object.keys(DEALER_LOGOS));

  var input   = document.getElementById('accessCode');
  var btn     = document.getElementById('submitBtn');
  var errEl   = document.getElementById('errorMsg');

  function attempt(){
    var code = input.value.trim().toUpperCase();
    if (!code){ errEl.textContent = 'Lütfen bir kod girin.'; return; }

    var match = VALID_CODES.some(function(v){ return v.toUpperCase() === code; });

    if (match){
      sessionStorage.setItem('isAuthenticated', 'true');
      
      // Şifreye ait logoyu sisteme kaydet (eğer logo yoksa boş bırakır)
      var logo = DEALER_LOGOS[code] || '';
      sessionStorage.setItem('dealerLogo', logo);
      
      window.location.href = 'index.html';
    } else {
      errEl.textContent = 'Geçersiz kod. Lütfen tekrar deneyin.';
      input.select();
    }
  }

  btn.addEventListener('click', attempt);
  input.addEventListener('keydown', function(e){
    if (e.key === 'Enter') attempt();
  });
})();
</script>

</body>
</html>
