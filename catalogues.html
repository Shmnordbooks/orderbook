/* ═══════════════════════════════════════════════════════════
   SHIMANO CATALOGUES PAGE — v1.0
   Matches hardgoods.html / shoes.html dark theme
   ═══════════════════════════════════════════════════════════ */

:root {
  --bg-deep:        #0a0e17;
  --bg-surface:     #0f1520;
  --bg-card:        #131a28;
  --bg-card-hover:  #182236;
  --border:         #1c2538;
  --border-hover:   #2a3a56;
  --text:           #e0e6f0;
  --text-muted:     #6a7a98;
  --text-dim:       #3e4f6e;
  --accent:         #0ea5e9;
  --accent-glow:    rgba(14,165,233,.15);
  --shimano-blue:   #0066cc;
  --sidebar-w:      230px;
  --header-h:       54px;
  --radius:         10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ─── HEADER ─────────────────────────────────────────── */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: linear-gradient(180deg, #0d1220 0%, #0a0f1a 100%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px;
  z-index: 100;
  gap: 16px;
}

.header-logo {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.header-logo img {
  height: 28px;
  vertical-align: middle;
}
.header-logo .dealer-logo {
  height: 36px;
  vertical-align: middle;
  border-radius: 6px;
  background: #fff;
  padding: 2px 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}

.header-date {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: .06em;
  text-transform: uppercase;
  flex-shrink: 0;
}

.header-spacer { flex: 1; }

.header-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-muted);
  border: 1px solid var(--border);
  padding: 5px 12px;
  border-radius: 4px;
  white-space: nowrap;
}

/* ─── LAYOUT ─────────────────────────────────────────── */
.layout {
  display: flex;
  margin-top: var(--header-h);
  height: calc(100vh - var(--header-h));
}

/* ─── SIDEBAR ────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
  display: flex;
  flex-direction: column;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.sb-chip {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all .2s;
  text-decoration: none;
  border-left: 3px solid transparent;
}
.sb-chip:hover { color: var(--text); background: rgba(255,255,255,.03); }
.sb-chip.active {
  color: var(--accent);
  background: var(--accent-glow);
  border-left-color: var(--accent);
}
.sb-chip svg { width: 16px; height: 16px; opacity: .6; flex-shrink: 0; }

.sb-sep {
  height: 1px;
  background: var(--border);
  margin: 8px 16px;
}

.sb-heading {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 12px 16px 6px;
}

.sb-chip .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-left: auto;
  flex-shrink: 0;
}

/* ─── MAIN CONTENT ───────────────────────────────────── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px 60px;
}
.main::-webkit-scrollbar { width: 5px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Page Title Area */
.page-title-area {
  margin-bottom: 40px;
  animation: fadeSlideUp .6s ease-out both;
}
.page-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 32px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 8px;
}
.page-subtitle {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 400;
  line-height: 1.5;
}

/* ─── CATALOG GRID ───────────────────────────────────── */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

/* ─── CATALOG CARD ───────────────────────────────────── */
.cat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all .35s cubic-bezier(.22,1,.36,1);
  position: relative;
  animation: fadeSlideUp .6s ease-out both;
}
.cat-card:nth-child(1) { animation-delay: .1s; }
.cat-card:nth-child(2) { animation-delay: .18s; }
.cat-card:nth-child(3) { animation-delay: .26s; }
.cat-card:nth-child(4) { animation-delay: .34s; }
.cat-card:nth-child(5) { animation-delay: .42s; }
.cat-card:nth-child(6) { animation-delay: .50s; }

.cat-card:hover {
  border-color: var(--border-hover);
  background: var(--bg-card-hover);
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,.4), 0 0 0 1px rgba(14,165,233,.08);
}

/* Thumbnail Area */
.cat-thumb {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 3;
  background: linear-gradient(145deg, #0c1222 0%, #141e34 50%, #0f1728 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.cat-thumb::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 50%, rgba(10,14,23,.85) 100%);
  pointer-events: none;
}

/* Brand logo / icon in thumbnail */
.cat-thumb-icon {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.cat-thumb-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 20%;
  filter: grayscale(.2) brightness(.7);
  transition: filter .4s, transform .5s cubic-bezier(.22,1,.36,1);
}
.cat-card:hover .cat-thumb-img {
  filter: grayscale(0) brightness(.8);
  transform: scale(1.04);
}
.cat-thumb-icon .brand-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 36px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(255,255,255,.12);
  transition: color .35s;
}
.cat-card:hover .brand-text { color: rgba(255,255,255,.22); }

.cat-thumb-icon .brand-logo {
  max-width: 160px;
  max-height: 60px;
  object-fit: contain;
  filter: brightness(0) invert(1);
  opacity: .25;
  transition: opacity .35s;
}
.cat-card:hover .brand-logo { opacity: .45; }

/* PDF badge */
.pdf-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 2;
  background: rgba(220,38,38,.85);
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: .1em;
  padding: 3px 8px;
  border-radius: 4px;
  backdrop-filter: blur(4px);
}

/* Year badge */
.year-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 2;
  background: rgba(14,165,233,.15);
  color: var(--accent);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: .08em;
  padding: 3px 10px;
  border-radius: 4px;
  border: 1px solid rgba(14,165,233,.2);
}

/* Card Info */
.cat-info {
  padding: 16px 20px 20px;
}
.cat-brand {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: .14em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.cat-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: .04em;
  color: var(--text);
  margin-bottom: 6px;
}
.cat-desc {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: 14px;
}

/* View button row */
.cat-action {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cat-view-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: .8;
  transition: opacity .25s;
}
.cat-card:hover .cat-view-btn { opacity: 1; }
.cat-view-btn svg { width: 14px; height: 14px; }

.cat-size {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: .04em;
}

/* ─── COMING SOON CARD ───────────────────────────────── */
.cat-card.coming-soon {
  cursor: default;
  opacity: .5;
}
.cat-card.coming-soon:hover {
  transform: none;
  border-color: var(--border);
  background: var(--bg-card);
  box-shadow: none;
}
.cat-card.coming-soon .cat-thumb::before {
  content: 'COMING SOON';
  position: absolute;
  z-index: 3;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 13px;
  letter-spacing: .18em;
  color: var(--text-dim);
  background: rgba(10,14,23,.7);
  padding: 6px 16px;
  border-radius: 4px;
  backdrop-filter: blur(6px);
}

/* ─── ANIMATIONS ─────────────────────────────────────── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── GRID PATTERN BG (subtle) ───────────────────────── */
.main::before {
  content: '';
  position: fixed;
  top: var(--header-h);
  left: var(--sidebar-w);
  right: 0; bottom: 0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,.015) 1px, transparent 0);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}
.main > * { position: relative; z-index: 1; }

/* ─── RESPONSIVE ─────────────────────────────────────── */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .main { padding: 24px 20px 40px; }
  .cat-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
}
@media (max-width: 600px) {
  .cat-grid { grid-template-columns: 1fr; }
}
</style>

/* ═══════════════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════════════ */
function renderCatalogues() {
  const grid = document.getElementById('catGrid');
  let html = '';

  CATALOGUES.forEach(cat => {
    const isSoon = cat.comingSoon || !cat.url || cat.url === 'YOUR_DROPBOX_LINK_HERE';
    const cls = isSoon ? 'cat-card coming-soon' : 'cat-card';
    const onclick = isSoon ? '' : `onclick="openCatalogue('${cat.url}')"`;

    html += `
      <div class="${cls}" ${onclick}>
        <div class="cat-thumb">
          ${cat.thumb ? `<img class="cat-thumb-img" src="${cat.thumb}" alt="${cat.brand}">` : ''}
          <span class="year-badge">${cat.year}</span>
          <span class="pdf-badge">PDF</span>
          ${!cat.thumb ? `<div class="cat-thumb-icon">
            ${cat.logoType === 'img' && cat.logoSrc
              ? `<img class="brand-logo" src="${cat.logoSrc}" alt="${cat.brand}">`
              : `<span class="brand-text">${cat.brand}</span>`
            }
          </div>` : ''}
        </div>
        <div class="cat-info">
          <div class="cat-brand" style="color:${cat.brandColor}">${cat.brand}</div>
          <div class="cat-name">${cat.name}</div>
          <div class="cat-desc">${cat.desc}</div>
          <div class="cat-action">
            <span class="cat-view-btn">
              ${isSoon ? 'Coming Soon' : `
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                  <polyline points="15 3 21 3 21 9"/>
                  <line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
                View Catalogue`}
            </span>
            <span class="cat-size">${cat.size}</span>
          </div>
        </div>
      </div>`;
  });

  grid.innerHTML = html;
}

function openCatalogue(url) {
  // Dropbox links: change ?dl=0 to ?raw=1 for inline PDF viewing
  let viewUrl = url;
  if (viewUrl.includes('dropbox.com')) {
    viewUrl = viewUrl.replace(/[?&]dl=0/, '?raw=1');
    if (!viewUrl.includes('raw=1')) {
      viewUrl += (viewUrl.includes('?') ? '&' : '?') + 'raw=1';
    }
  }
  window.open(viewUrl, '_blank');
}

// Init
document.addEventListener('DOMContentLoaded', renderCatalogues);

// Shared-cart badge updater for Order Summary
(function updateSharedBadge(){
  function upd(){
    try{
      var raw=localStorage.getItem('shimano_all_orders');
      if(!raw){document.getElementById('sharedCartBadge').style.display='none';return;}
      var all=JSON.parse(raw),t=0;
      for(var k in all){if(all.hasOwnProperty(k)){t+=Object.keys(all[k]).length;}}
      var b=document.getElementById('sharedCartBadge');
      if(b){if(t>0){b.textContent=t;b.style.display='inline-block';}else{b.style.display='none';}}
    }catch(e){}
  }
  upd();
  setInterval(upd,800);
  window.addEventListener('storage',function(e){if(e.key==='shimano_all_orders')upd();});
})();
</script>

</body>
</html>
